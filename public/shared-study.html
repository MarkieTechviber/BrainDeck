<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#6c63ff" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#1a1f2e" media="(prefers-color-scheme: dark)">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="BrainDeck">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.svg">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="application-name" content="BrainDeck">
  <meta name="msapplication-TileColor" content="#6c63ff">
  <meta name="msapplication-TileImage" content="/icons/icon-144x144.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BrainDeck — Shared Deck</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/css/_variables.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
  <link href="/css/flashcard.css" rel="stylesheet">
  <link href="/css/quiz.css" rel="stylesheet">
  <link href="/css/summary.css" rel="stylesheet">
  <meta property="og:title" content="BrainDeck — Shared Deck">
  <meta property="og:description" content="Turn any PDF, DOCX, PPTX, or TXT into flashcards, summaries, or quizzes instantly using AI.">
  <meta name="description" content="BrainDeck — AI-powered study cards from your documents. Free, fast, no account needed.">
</head>
<body class="bd-body">

<nav class="navbar navbar-light bd-navbar">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center gap-2 text-decoration-none" href="/">
      <i class="bi bi-journals bd-brand-icon" style="color:var(--primary)"></i>
      <span class="bd-brand-text">BrainDeck</span>
    </a>
    <div class="d-flex align-items-center gap-2">
      <span class="px-3 py-1 rounded-pill bd-font-xs fw-600"
            style="background:rgba(108,99,255,0.12);color:var(--primary);border:1px solid rgba(108,99,255,0.25)">
        <i class="bi bi-share me-1"></i>Shared Deck
      </span>
      <a href="/register.html" class="btn-primary-neu px-3 py-2 rounded-3 bd-font-sm fw-600 text-decoration-none">
        <i class="bi bi-person-plus me-1"></i>Sign up free
      </a>
    </div>
  </div>
</nav>

<main class="py-4 z-1">
  <div class="container" id="mainContent">
    <div class="text-center py-5">
      <div class="bd-spinner mx-auto mb-3"></div>
      <p class="bd-text-muted">Loading shared deck...</p>
    </div>
  </div>
</main>

<div class="modal fade" id="noSessionModal" tabindex="-1" data-bs-backdrop="static">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 rounded-4 p-3 text-center"
         style="background:var(--glass-bg);backdrop-filter:var(--glass-blur);border:1px solid var(--glass-border)!important">
      <div class="modal-body py-4">
        <i class="bi bi-exclamation-circle-fill fs-1 mb-3 d-block" style="color:var(--warning)"></i>
        <h5 class="fw-bold mb-2" style="color:var(--text)">Deck not found</h5>
        <p class="bd-text-muted mb-4">This shared deck has expired or doesn't exist.</p>
        <a href="/" class="btn-primary-neu px-5 py-2 rounded-3 fw-600 text-decoration-none">Go to BrainDeck</a>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/theme.js"></script>
<script>
(async () => {
  const shareId = location.pathname.split('/study/')[1];
  if (!shareId) { new bootstrap.Modal(document.getElementById('noSessionModal')).show(); return; }

  const r = await fetch(`/api/share/${shareId}`).catch(()=>null);
  if (!r?.ok) { new bootstrap.Modal(document.getElementById('noSessionModal')).show(); return; }
  const d = await r.json();
  if (!d.success) { new bootstrap.Modal(document.getElementById('noSessionModal')).show(); return; }

  const { cards, cardType, title, cardCount, views } = d.data;

  // Store in session so the study JS can read it
  localStorage.setItem('bd_session', JSON.stringify({ sessionId: shareId, cards, cardType, cardCount }));

  const main = document.getElementById('mainContent');
  const page = { flashcard: '/flashcard.html', summary: '/summary.html', quiz: '/quiz.html' }[cardType] || '/flashcard.html';

  main.innerHTML = `
    <div class="row justify-content-center">
      <div class="col-md-7 col-lg-5 text-center">
        <div class="glass-card p-4 mb-4">
          <i class="bi bi-collection fs-1 mb-3 d-block" style="color:var(--primary)"></i>
          <h3 class="fw-800 mb-2" style="color:var(--text)">${title}</h3>
          <p class="bd-text-muted mb-1">${cardCount} ${cardType} cards</p>
          <p class="bd-font-xs bd-text-muted mb-4"><i class="bi bi-eye me-1"></i>${views} views</p>
          <a href="${page}" class="btn-primary-neu py-3 px-5 rounded-3 fw-700 fs-6 text-decoration-none d-block">
            <i class="bi bi-play-fill me-2"></i>Start Studying
          </a>
          <div class="mt-3 pt-3" style="border-top:.5px solid rgba(108,99,255,0.1)">
            <p class="bd-font-xs bd-text-muted mb-2">Want to save this deck?</p>
            <a href="/register.html" class="btn-neu px-4 py-2 rounded-3 bd-font-sm fw-600 text-decoration-none">
              <i class="bi bi-person-plus me-1"></i>Create free account
            </a>
          </div>
        </div>
      </div>
    </div>`;
})();
</script>
  <script src="/js/pwa.js"></script>
</body>
</html>
