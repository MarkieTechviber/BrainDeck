<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#6c63ff" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#1a1f2e" media="(prefers-color-scheme: dark)">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="BrainDeck">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.svg">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="application-name" content="BrainDeck">
  <meta name="msapplication-TileColor" content="#6c63ff">
  <meta name="msapplication-TileImage" content="/icons/icon-144x144.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BrainDeck — Verify Email</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="css/_variables.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body class="bd-body d-flex align-items-center justify-content-center" style="min-height:100vh">

<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-5 col-sm-8">

      <!-- Verifying state -->
      <div id="stateVerifying" class="glass-card p-5 text-center">
        <div class="bd-spinner mx-auto mb-4"></div>
        <h4 class="fw-800 mb-2" style="color:var(--text)">Verifying your email...</h4>
        <p class="bd-text-muted bd-font-sm mb-0">Just a moment.</p>
      </div>

      <!-- Success state -->
      <div id="stateSuccess" class="glass-card p-5 text-center d-none">
        <div style="width:72px;height:72px;border-radius:50%;background:rgba(52,211,153,0.15);
                    display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem">
          <i class="bi bi-check-lg" style="font-size:2rem;color:var(--success)"></i>
        </div>
        <h4 class="fw-800 mb-2" style="color:var(--text)">Email verified!</h4>
        <p class="bd-text-muted mb-4">Welcome to BrainDeck. Your account is fully activated.</p>
        <a href="/" class="btn-primary-neu px-5 py-2 rounded-3 fw-700 text-decoration-none">
          <i class="bi bi-house me-2"></i>Start studying
        </a>
      </div>

      <!-- Error state -->
      <div id="stateError" class="glass-card p-5 text-center d-none">
        <div style="width:72px;height:72px;border-radius:50%;background:rgba(248,113,113,0.12);
                    display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem">
          <i class="bi bi-exclamation-triangle" style="font-size:2rem;color:var(--danger)"></i>
        </div>
        <h4 class="fw-800 mb-2" style="color:var(--text)">Link expired</h4>
        <p class="bd-text-muted mb-4" id="errorMsg">This verification link is invalid or has expired.</p>
        <a href="/login.html" class="btn-neu px-4 py-2 rounded-3 fw-600 text-decoration-none me-2">Log In</a>
        <button class="btn-primary-neu px-4 py-2 rounded-3 fw-600" id="resendBtn">
          <i class="bi bi-envelope me-1"></i>Resend email
        </button>
      </div>

      <!-- Already verified -->
      <div id="stateAlready" class="glass-card p-5 text-center d-none">
        <div style="width:72px;height:72px;border-radius:50%;background:rgba(108,99,255,0.12);
                    display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem">
          <i class="bi bi-patch-check-fill" style="font-size:2rem;color:var(--primary)"></i>
        </div>
        <h4 class="fw-800 mb-2" style="color:var(--text)">Already verified</h4>
        <p class="bd-text-muted mb-4">Your email is already confirmed. You're good to go!</p>
        <a href="/" class="btn-primary-neu px-5 py-2 rounded-3 fw-700 text-decoration-none">
          <i class="bi bi-house me-2"></i>Go to BrainDeck
        </a>
      </div>

    </div>
  </div>
</div>

<script src="js/theme.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
(async () => {
  const show = id => {
    ['stateVerifying','stateSuccess','stateError','stateAlready'].forEach(s => {
      document.getElementById(s).classList.toggle('d-none', s !== id);
    });
  };

  const params = new URLSearchParams(window.location.search);
  const token  = params.get('token');

  if (!token) { show('stateError'); return; }

  try {
    const r = await fetch('/api/auth/verify-email', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ token }),
    });
    const d = await r.json();

    if (d.success) {
      show('stateSuccess');
    } else if (d.message?.includes('already verified')) {
      show('stateAlready');
    } else {
      document.getElementById('errorMsg').textContent = d.message || 'Verification failed.';
      show('stateError');
    }
  } catch {
    show('stateError');
  }

  // Resend button
  document.getElementById('resendBtn')?.addEventListener('click', async () => {
    const token = BrainDeckAuth.getToken();
    if (!token) { window.location.href = '/login.html'; return; }
    const r = await fetch('/api/auth/resend-verification', {
      method: 'POST',
      headers: BrainDeckAuth.getHeaders(),
      credentials: 'include',
    });
    const d = await r.json();
    alert(d.message || 'Verification email sent!');
  });
})();
</script>
  <script src="/js/pwa.js"></script>
</body>
</html>
