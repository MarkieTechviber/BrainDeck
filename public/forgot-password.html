<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#6c63ff" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#1a1f2e" media="(prefers-color-scheme: dark)">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="BrainDeck">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.svg">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="application-name" content="BrainDeck">
  <meta name="msapplication-TileColor" content="#6c63ff">
  <meta name="msapplication-TileImage" content="/icons/icon-144x144.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BrainDeck — Reset Password</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="css/_variables.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
  <meta property="og:title" content="BrainDeck — Reset Password">
  <meta property="og:description" content="Turn any PDF, DOCX, PPTX, or TXT into flashcards, summaries, or quizzes instantly using AI.">
  <meta name="description" content="BrainDeck — AI-powered study cards from your documents. Free, fast, no account needed.">
</head>
<body class="bd-body">
  <nav class="navbar bd-navbar border-bottom">
    <div class="container">
      <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="/">
        <i class="bi bi-journals text-primary fs-4"></i>
        <span class="bd-brand-text">BrainDeck</span>
      </a>
    </div>
  </nav>
  <section class="py-5">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
          <div class="text-center mb-4">
            <div class="bg-primary-subtle rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width:56px;height:56px;">
              <i class="bi bi-lock text-primary fs-4"></i>
            </div>
            <h2 class="fw-bold sc-navy">Forgot password?</h2>
            <p class="text-secondary sc-font-size-sm">Enter your email and we'll send a reset link</p>
          </div>
          <div class="card border-0 shadow-sm rounded-4 p-2">
            <div class="card-body p-4">
              <div class="alert alert-danger rounded-3 d-none py-2 sc-font-size-sm" id="errorAlert">
                <i class="bi bi-exclamation-triangle-fill me-2"></i><span id="errorMsg"></span>
              </div>
              <div class="alert alert-success rounded-3 d-none py-2 sc-font-size-sm" id="successAlert">
                <i class="bi bi-envelope-check-fill me-2"></i><span id="successMsg"></span>
              </div>
              <div class="mb-4">
                <label class="form-label fw-semibold sc-navy sc-font-size-sm">Email address</label>
                <input type="email" class="form-control rounded-3" id="email" placeholder="you@example.com">
              </div>
              <div class="d-grid">
                <button class="btn btn-primary btn-lg fw-semibold rounded-3 py-2" id="sendBtn" type="button">
                  <i class="bi bi-send me-2"></i>Send Reset Link
                </button>
              </div>
            </div>
          </div>
          <p class="text-center mt-3">
            <a href="login.html" class="text-secondary sc-font-size-sm text-decoration-none">
              <i class="bi bi-arrow-left me-1"></i>Back to login
            </a>
          </p>
        </div>
      </div>
    </div>
  </section>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.getElementById('sendBtn').addEventListener('click', async () => {
      const btn = document.getElementById('sendBtn');
      const err = document.getElementById('errorAlert');
      const suc = document.getElementById('successAlert');
      [err, suc].forEach(el => el.classList.add('d-none'));
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Sending...';
      try {
        const res = await fetch('/api/auth/forgot-password', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: document.getElementById('email').value.trim() }),
        });
        const d = await res.json();
        document.getElementById('successMsg').textContent = d.message;
        suc.classList.remove('d-none');
      } catch {
        document.getElementById('errorMsg').textContent = 'Something went wrong.';
        err.classList.remove('d-none');
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-send me-2"></i>Send Reset Link';
      }
    });
  </script>
  <script src="/js/pwa.js"></script>
</body>
</html>
